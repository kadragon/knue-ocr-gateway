name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: gateway
      - run: go test ./...

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.20"
          enable-cache: true
      # Core + dev group, no `engine` extra — tests mock inference.
      - run: uv sync --locked
      - run: uv run --no-sync python -m pytest tests/ -q
