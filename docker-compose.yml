services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy-data:/data
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - ocrnet
    restart: unless-stopped

  gateway:
    build: ./gateway
    expose:
      - "8080"
    environment:
      WORKER_URL: "http://ocr-worker:9000"
      MAX_FILE_MB: "20"
      MAX_CONCURRENCY: "4"
      API_KEY: "${API_KEY:?API_KEY must be set in .env}"
      REQUEST_TIMEOUT_SECONDS: "120"
    depends_on:
      ocr-worker:
        condition: service_healthy
    healthcheck:
      # Distroless image (no shell/curl): the gateway binary probes itself.
      test: ["CMD", "/gateway", "-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Graceful shutdown drains in-flight OCR requests (up to
    # REQUEST_TIMEOUT_SECONDS); default 10s grace would SIGKILL mid-request.
    stop_grace_period: 130s
    networks:
      - ocrnet
    restart: unless-stopped

  ocr-worker:
    build: ./worker
    expose:
      - "9000"
    environment:
      # Worker-side processing budget; keep below the gateway's
      # REQUEST_TIMEOUT_SECONDS so abandoned jobs stop burning CPU.
      OCR_DEADLINE_SECONDS: "110"
    volumes:
      - paddleocr-models:/root/.paddleocr
    stop_grace_period: 130s
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - ocrnet
    restart: unless-stopped

networks:
  ocrnet:

volumes:
  paddleocr-models:
    name: knue-ocr-gateway_paddleocr-models
  caddy-data:
    name: knue-ocr-gateway_caddy-data
